<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sản phẩm</title>

    <style>
    
    </style>

  </head>

  <body>
    <div class="container">
      <h1>Quản lý Sản phẩm</h1>

      <h2>Thêm sản phẩm mới</h2>
      <div id="error-message" class="error-msg"></div>
      <div class="form-group">
        <input type="text" id="input-name" placeholder="Tên sản phẩm ">
        <input type="text" id="input-category" placeholder="Danh mục">
        <input type="number" id="input-price" placeholder="Đơn giá">
        <input type="number" id="input-quantity" placeholder="Số lượng">
        <button id="btn-add">Thêm</button>
      </div>

      <h2>Danh sách sản phẩm</h2>
      <table id="product-table">
        <thead>
          <tr>
            <th>STT</th>
            <th class="sortable" id="sort-name">Tên sản phẩm <span id="sort-icon"></span></th>
            <th>Danh mục</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      let productsList = [];
      let isAscending = true; 

      const tbody = document.querySelector('#product-table tbody')
      const btnAdd = document.getElementById('btn-add');
      const sortNameHeader = document.getElementById('sort-name');
      const sortIcon = document.getElementById('sort-icon');
      const errorMsg = document.getElementById('error-message');

      function loadProducts() {
        const cur = new XMLHttpRequest();
        cur.onreadystatechange = function() {
          if (cur.readyState === 4 && cur.status === 200) {
            productsList = JSON.parse(cur.responseText);
            renderTable();
          }
        };
        cur.open('GET', 'products.json');
        cur.send();
      }

      function renderTable() {
        tbody.innerHTML = '';
        productsList.forEach((product, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${product.name}</td>
            <td>${product.category || ''}</td>
            <td>${product.price}</td>
            <td>${product.quantity}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      sortNameHeader.addEventListener('click', () => {
        if(productsList.length === 0) return;
        productsList.sort((a, b) => {
          const nameA = a.name.toLowerCase();
          const nameB = b.name.toLowerCase();
          if (nameA < nameB) return isAscending ? -1 : 1;
          else return isAscending ? 1 : -1;
          return 0;
        });
        sortIcon.textContent = isAscending ? '▲' : '▼';
  
        isAscending = !isAscending;
        renderTable();
      });

      btnAdd.addEventListener('click', () => {
        const inputName = document.getElementById('input-name');
        const inputCategory = document.getElementById('input-category');
        const inputPrice = document.getElementById('input-price');
        const inputQuantity = document.getElementById('input-quantity');

        const nameValue = inputName.value.trim();
        const categoryValue = inputCategory.value.trim();
        const priceValue = parseFloat(inputPrice.value);
        const quantityValue = parseInt(inputQuantity.value);

        if (nameValue.length < 3) {
          showError('Errorrrrrrr !!!!!');
          return;
        }
        if(isNaN(priceValue) || priceValue <= 0) {
          showError('Errrorrrrrrr Priceeeee !!!');
          return;
        }
        if (isNaN(quantityValue) || quantityValue < 1) {
          showError('Erorrrrrrrrr quantityyyyyy !!!');
          return;
        }

        errorMsg.style.display = 'none';

        const newProduct = {
          id: Date.now(),
          name: nameValue,
          category: categoryValue,
          price: priceValue,
          quantity: quantityValue
        };

        productsList.push(newProduct);
        renderTable();

        inputName.value = '';
        inputCategory.value = '';
        inputPrice.value = '';
        inputQuantity.value = '';
      });

      function showError(message) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
      }
      window.onload = loadProducts;
    </script>

  </body>
</html>
